<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA · AI Assistant</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0c0c10;
            --surface: #13131a;
            --surface-2: #1c1c26;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6aff;
            --accent-glow: rgba(124,106,255,0.25);
            --accent-2: #ff6ac1;
            --text-primary: #f0f0f5;
            --text-secondary: #8a8a9a;
            --user-bubble: linear-gradient(135deg, #7c6aff 0%, #a855f7 100%);
            --ai-bubble: #1c1c26;
            --dot-1: #7c6aff;
            --dot-2: #a855f7;
            --dot-3: #ff6ac1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(168,85,247,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 60% 10%, rgba(255,106,193,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle animated grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        #chat-container {
            position: relative;
            z-index: 1;
            width: 92%;
            max-width: 860px;
            height: 88vh;
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 40px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(124,106,255,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: containerReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes containerReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ── */
        #chat-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .header-orb {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
            position: relative;
            flex-shrink: 0;
        }

        .header-orb svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .header-orb::after {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--surface);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
        }

        .header-info { flex: 1; }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }

        .header-subtitle {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 1px;
            font-weight: 300;
        }

        .header-badge {
            font-family: 'Syne', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(124,106,255,0.1);
            border: 1px solid rgba(124,106,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* ── Chat Box ── */
        #chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* ── Messages ── */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: msgReveal 0.35s cubic-bezier(0.16,1,0.3,1) both;
            width: 100%;
        }

        .message-row > div:not(.avatar) {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-row.user > div:not(.avatar) {
            align-items: flex-end;
        }

        .message-row.ai > div:not(.avatar) {
            align-items: flex-start;
        }

        @keyframes msgReveal {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
        }

        .avatar.ai {
            background: linear-gradient(135deg, #7c6aff, #a855f7);
            box-shadow: 0 0 12px rgba(124,106,255,0.4);
            color: white;
        }

        .avatar.user {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }

        .message {
            padding: 13px 20px;
            border-radius: 18px;
            max-width: 100%;
            min-width: 140px;
            width: fit-content;
            line-height: 1.65;
            font-size: 0.925rem;
            font-weight: 400;
            word-break: break-word;
            white-space: normal;
            position: relative;
        }

        .user .message {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(124,106,255,0.3);
        }

        .ai .message {
            background: var(--ai-bubble);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 5px;
        }

        /* Markdown inside AI bubbles */
        .ai .message p { margin-bottom: 8px; }
        .ai .message p:last-child { margin-bottom: 0; }
        .ai .message strong { color: var(--text-primary); font-weight: 600; }
        .ai .message em { color: var(--text-secondary); }

        .ai .message pre {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 12px 14px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 0.82rem;
        }

        .ai .message code {
            font-family: 'Fira Mono', 'Consolas', monospace;
            background: rgba(124,106,255,0.15);
            color: #c4b5fd;
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 0.85em;
        }

        .ai .message pre code {
            background: none;
            color: #e2e8f0;
            padding: 0;
        }

        .ai .message table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.875rem;
        }

        .ai .message th, .ai .message td {
            border: 1px solid rgba(255,255,255,0.08);
            padding: 8px 10px;
            text-align: left;
        }

        .ai .message th {
            background: rgba(124,106,255,0.1);
            color: var(--accent);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
        }

        .ai .message ul, .ai .message ol {
            padding-left: 18px;
            margin: 6px 0;
        }

        .ai .message li { margin-bottom: 4px; }

        /* ── Timestamp ── */
        .timestamp {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
            opacity: 0.7;
        }

        .message-row.user .timestamp { text-align: right; }

        /* ── File Preview ── */
        #file-preview {
            display: none;
            margin: 0 20px 8px;
            padding: 10px 14px;
            background: rgba(124,106,255,0.08);
            border: 1px solid rgba(124,106,255,0.2);
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--accent);
            display: none;
            align-items: center;
            gap: 8px;
        }

        #file-preview .file-icon { font-size: 1rem; }
        #file-preview .file-name { flex: 1; font-weight: 500; }

        #file-preview .remove-file {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1;
            transition: color 0.2s;
        }
        #file-preview .remove-file:hover { color: #ff6ac1; }

        /* ── Input Area ── */
        #input-area {
            padding: 14px 20px 18px;
            background: rgba(255,255,255,0.015);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        input[type="file"] { display: none; }

        .attach-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .attach-btn:hover {
            background: rgba(124,106,255,0.12);
            border-color: rgba(124,106,255,0.3);
            color: var(--accent);
        }

        .attach-btn svg { width: 18px; height: 18px; }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        #user-input {
            width: 100%;
            padding: 11px 48px 11px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.915rem;
            color: var(--text-primary);
            transition: all 0.25s;
            caret-color: var(--accent);
        }

        #user-input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        #user-input:focus {
            border-color: rgba(124,106,255,0.4);
            box-shadow: 0 0 0 3px rgba(124,106,255,0.08);
            background: var(--surface-2);
        }

        #send-btn {
            position: absolute;
            right: 8px;
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: var(--user-bubble);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 10px rgba(124,106,255,0.35);
        }

        #send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(124,106,255,0.5);
        }

        #send-btn:active { transform: scale(0.95); }

        #send-btn svg { width: 14px; height: 14px; fill: white; }

        /* ── Typing Indicator ── */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: msgReveal 0.3s ease both;
        }

        .typing-bubble {
            padding: 14px 18px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { background: var(--dot-1); animation-delay: 0s; }
        .dot:nth-child(2) { background: var(--dot-2); animation-delay: 0.2s; }
        .dot:nth-child(3) { background: var(--dot-3); animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Hint bar ── */
        .input-hint {
            text-align: center;
            font-size: 0.67rem;
            color: var(--text-secondary);
            opacity: 0.5;
            padding-top: 6px;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<div id="chat-container">

    <!-- Header -->
    <div id="chat-header">
        <div class="header-orb">
            <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 2.5-1.3 4.7-3.3 6L17 22H7l1.3-7C6.3 13.7 5 11.5 5 9a7 7 0 017-7z"/></svg>
        </div>
        <div class="header-info">
            <div class="header-title">AURA</div>
            <div class="header-subtitle">AI Assistant · Always listening</div>
        </div>
        <div class="header-badge">Online</div>
    </div>

    <!-- Messages -->
    <div id="chat-box">
        <div class="message-row ai">
            <div class="avatar ai">A</div>
            <div>
                <div class="message">Hey there 👋 I'm <strong>Aura</strong>, your AI assistant. Send me a message, or attach an image or file — I'm here to help.</div>
                <div class="timestamp">Just now</div>
            </div>
        </div>
    </div>

    <!-- File Preview -->
    <div id="file-preview">
        <span class="file-icon">📎</span>
        <span class="file-name" id="file-name-text"></span>
        <span class="remove-file" onclick="removeFile()">✕</span>
    </div>

    <!-- Input -->
    <div id="input-area">
        <label for="file-input" class="attach-btn" title="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
        </label>
        <input type="file" id="file-input" accept="image/*,.pdf,.txt" onchange="showFilePreview()">

        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Message Aura…" onkeypress="handleKeyPress(event)" autocomplete="off">
            <button id="send-btn" onclick="sendMessage()" title="Send">
                <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
    </div>
    <div class="input-hint">Press Enter to send · Supports images, PDFs, and text files</div>

</div>

<script>
    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function showFilePreview() {
        const fileInput = document.getElementById('file-input');
        const filePreview = document.getElementById('file-preview');
        const fileNameText = document.getElementById('file-name-text');
        if (fileInput.files.length > 0) {
            fileNameText.textContent = fileInput.files[0].name;
            filePreview.style.display = 'flex';
        } else {
            filePreview.style.display = 'none';
        }
    }

    function removeFile() {
        document.getElementById('file-input').value = '';
        document.getElementById('file-preview').style.display = 'none';
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }

    function showTypingIndicator() {
        const chatBox = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing-indicator';
        row.innerHTML = `
            <div class="avatar ai">A</div>
            <div class="typing-bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>`;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    function appendMessage(role, html) {
        const chatBox = document.getElementById('chat-box');
        const isUser = role === 'user';
        const row = document.createElement('div');
        row.className = `message-row ${role}`;
        const avatarLabel = isUser ? 'U' : 'A';
        row.innerHTML = `
            ${isUser ? '' : `<div class="avatar ai">${avatarLabel}</div>`}
            <div>
                <div class="message">${html}</div>
                <div class="timestamp">${getTime()}</div>
            </div>
            ${isUser ? `<div class="avatar user">${avatarLabel}</div>` : ''}
        `;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const messageText = inputField.value.trim();
        const file = fileInput.files[0];

        if (!messageText && !file) return;

        let displayHTML = messageText ? messageText.replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
        if (file) displayHTML += (displayHTML ? '<br><br>' : '') + `<span style="opacity:.75;font-size:.85em">📎 ${file.name}</span>`;
        appendMessage('user', displayHTML);

        inputField.value = '';
        fileInput.value = '';
        document.getElementById('file-preview').style.display = 'none';

        showTypingIndicator();

        const formData = new FormData();
        formData.append('message', messageText);
        if (file) formData.append('file', file);

        try {
            const response = await fetch('/api/chat', { method: 'POST', body: formData });
            const data = await response.json();
            removeTypingIndicator();
            appendMessage('ai', marked.parse(data.reply || 'No reply received.'));
        } catch (error) {
            removeTypingIndicator();
            appendMessage('ai', '⚠️ Could not reach the server. Please make sure the backend is running.');
        }
    }
</script>

</body>
</html>
